name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work
      - 'codex/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check unresolved merge markers
        run: python scripts/check_conflict_markers.py

      - name: Compile Python modules
        run: |
          python -m py_compile app/main.py app/database.py app/drivers/personalpay.py app/drivers/universalcoins.py scripts/check_conflict_markers.py scripts/reset_and_add_pp.py
